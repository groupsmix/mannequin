name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Aftman
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Check formatting (StyLua)
        run: stylua --check src/

      - name: Lint (Selene)
        run: |
          selene src/ 2>&1 | tee /tmp/selene.txt || true
          if grep -q "^0 errors$" /tmp/selene.txt; then
            echo "Selene passed (0 errors)"
          else
            echo "::error::Selene found lint errors"
            exit 1
          fi

      - name: Build (Rojo)
        run: rojo build -o Mannequin.rbxl
